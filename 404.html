<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>404 - Transmission Failed | Ryze Tha Kidd</title>

  <!-- Stylesheets -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />
  <link href="./css/custom.css" rel="stylesheet" />
  <link href="./css/theme.css" rel="stylesheet" />

  <style>
    body {
      background-color: var(--primary-bg, #0a0a0a);
      color: var(--text-primary, #ffffff);
      overflow: hidden;
    }

    .cont_error_page {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Animation States */
    body.cont_error_active h1,
    body.cont_error_active p {
      left: 0 !important;
      opacity: 1 !important;
    }

    body.cont_error_active .cont_aura_1 {
      animation: animation_error_1 4s linear infinite alternate;
      transform: rotate(20deg);
    }

    body.cont_error_active .cont_aura_2 {
      animation: animation_error_2 4s linear infinite alternate;
      transform: rotate(-20deg);
    }

    @keyframes animation_error_1 {
      from { transform: rotate(20deg); }
      to { transform: rotate(25deg); }
    }

    @keyframes animation_error_2 {
      from { transform: rotate(-15deg); }
      to { transform: rotate(-20deg); }
    }

    .transition-custom {
      transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
  </style>
</head>

<body>

  <div class="cont_error_page">
    <!-- 404 Message Card -->
    <div class="position-relative z-10 text-center p-4 p-md-5 card border-subtle surface max-w-card w-100 shadow-lg" style="z-index: 10;">
      <h1 class="display-1 fw-black text-gradient position-relative transition-custom" style="left: -100px; opacity: 0;">
        404
      </h1>
      
      <p class="mt-4 fs-3 fs-md-2 fw-bold text-uppercase letter-spacing-wider position-relative transition-custom" style="left: 100px; opacity: 0; transition-delay: 0.2s;">
        // Transmission Failed //
      </p>
      
      <p class="mt-2 fs-5 text-muted">
        In other words, the requested data packet is missing from the server.
      </p>

      <!-- Action Buttons -->
      <div class="mt-5 d-flex flex-column flex-sm-row justify-content-center gap-3">
        <a href="/" class="btn btn-primary btn-lg px-5 py-3 fw-bold">
          <i class="fas fa-home me-2"></i> RETURN TO HUB
        </a>
        <a href="discography.html" class="btn btn-outline-primary btn-lg px-5 py-3 fw-bold">
          <i class="fas fa-compact-disc me-2"></i> FIND MUSIC
        </a>
      </div>
    </div>

    <!-- Decorative Auras (Glitch Effect Backgrounds) -->
    <div class="cont_aura_1 position-absolute top-0 transition-custom" 
         style="width:300px; height:120%; right:-170px; background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%); z-index:0;">
    </div>
    
    <div class="cont_aura_2 position-absolute transition-custom" 
         style="bottom:-300px; height:300px; width: 100%; right:-10%; background: radial-gradient(circle, rgba(124,58,237,0.1) 0%, transparent 70%); z-index:0;">
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Trigger animations after a slight delay
      setTimeout(() => {
        document.body.classList.add("cont_error_active");
      }, 100);
    });
  </script>
</body>

</html>
