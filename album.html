<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Basic Meta Tags -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Album | Ryze Tha Kidd</title>
  <meta name="robots" content="noindex, nofollow" />

  <!-- Stylesheets -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />
  <link href="./css/custom.css" rel="stylesheet" />
  <link href="./css/theme.css" rel="stylesheet" />

  <!-- Icons -->
  <link rel="icon" href="/WebpageIcon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="192x192" href="/WebpageIcon.png">

  <style>
    /* Page-specific helpers removed; use shared canvas */
  </style>
</head>

<body>

  <!-- Interactive Background -->
  <canvas id="interactive-bg" aria-hidden="true"></canvas>

  <!-- Navigation -->
  <div id="navbar-container"></div>

  <!-- Main Layout Wrapper -->
  <div class="d-flex flex-column position-relative" style="min-height: 100vh;">

    <main id="main-content" class="flex-grow-1 container py-5 py-md-7 py-lg-8 w-100">

      <!-- Dynamic Header Area -->
      <header class="page-hero text-center text-lg-start mb-5">
        <p class="eyebrow">Release</p>
        <h1 class="display-5 fw-black text-gradient mb-2">Album / EP Details</h1>
        <p class="text-muted max-w-text mb-0">Full metadata, listening links, and tracklist.</p>
      </header>

      <!-- Loading State Indicator -->
      <div id="loading-state" class="text-center text-muted mt-8" aria-live="polite">
        <i class="fas fa-compact-disc fa-spin fs-1 text-gradient"></i>
        <p class="mt-4 fs-5">Loading Album...</p>
      </div>

      <!-- Error State Message -->
      <div id="error-state" class="text-center text-danger mt-8 d-none" aria-live="assertive">
        <p class="fs-5">
          <strong>ERROR 404:</strong> Album not found. Please check the URL.
        </p>
        <a href="/discography" class="btn btn-primary mt-4">Back to Discography</a>
      </div>

      <!-- Dynamic Album Detail Section -->
      <section id="album-details" class="d-none">

        <!-- Album Identity Row -->
        <div class="row g-5 g-lg-8 align-items-start mb-7 mb-md-9 mb-lg-10">
          
          <!-- Album Cover Panel -->
          <div class="col-12 col-lg-5">
            <div class="album-cover-container">
              <img id="album-image" src="" alt="Album Cover" class="w-100 rounded-3 shadow-lg" />
              <div class="album-type-badge mt-3">
                <span id="album-type" class="badge bg-gradient fs-6"></span>
              </div>
            </div>
          </div>

          <!-- Album Info Panel -->
          <div class="col-12 col-lg-7">
            <div class="album-info">
              <h1 id="album-title" class="display-4 display-md-3 fw-black text-gradient lh-1 mb-4"></h1>
              <p id="album-artist" class="fs-4 fs-md-3 text-muted fw-light mb-5"></p>

              <!-- Metadata Grid -->
              <div class="album-metadata mb-6">
                <div class="row g-3 g-md-4">
                  <div class="col-6">
                    <small class="text-muted text-uppercase fw-bold d-block mb-2">Release Date</small>
                    <p id="album-date" class="fs-6 mb-0"></p>
                  </div>
                  <div class="col-6">
                    <small class="text-muted text-uppercase fw-bold d-block mb-2">Type</small>
                    <p id="album-type-text" class="fs-6 mb-0 text-capitalize"></p>
                  </div>
                  <div class="col-6">
                    <small class="text-muted text-uppercase fw-bold d-block mb-2">Track Count</small>
                    <p id="album-track-count" class="fs-6 mb-0"></p>
                  </div>
                </div>
              </div>

              <!-- Action Buttons -->
              <div class="album-actions d-flex flex-column flex-md-row gap-3">
                <a id="listen-btn" href="#" target="_blank" rel="noopener noreferrer" class="btn btn-primary btn-lg">
                  <i class="fas fa-play-circle me-2"></i>Listen Now
                </a>
                <a href="/discography" class="btn btn-outline-primary btn-lg">
                  <i class="fas fa-arrow-left me-2"></i>Back to Discography
                </a>
              </div>
            </div>
          </div>
        </div>

        <!-- Tracklist Content -->
        <div class="row g-5 g-lg-8">
          <div class="col-12">
            <div class="album-tracklist card border-subtle surface">
              <div class="card-body p-5 p-md-6">
                <h3 class="h4 fw-bold mb-5">Tracklist</h3>
                <div id="tracklist-container" class="tracklist">
                  <!-- Tracks injected via JS -->
                </div>
              </div>
            </div>
          </div>
        </div>

      </section>
    </main>

    <!-- Footer -->
    <div id="footer-container"></div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js" defer></script>
</body>

</html>
